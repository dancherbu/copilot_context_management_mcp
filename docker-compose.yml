services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-copilot-context-management-mcp}-app
    restart: unless-stopped
    environment:
      REDIS_HOST: ${COMPOSE_PROJECT_NAME:-copilot-context-management-mcp}-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-replace-me}
      CCM_API_KEY: ${CCM_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen2.5-coder:7b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      WORKSPACE_WATCH_ROOT: ${WORKSPACE_WATCH_ROOT:-/workspace/projects}
      LOG_FILE_PATH: ${LOG_FILE_PATH:-/app/logs/application.log}
      VECTOR_STORE_FILE: ${VECTOR_STORE_FILE:-/app/data/vector-store.json}
      CCM_USAGE_METRICS_FILE: ${CCM_USAGE_METRICS_FILE:-/app/data/usage-metrics.json}
    ports:
      - "${APP_PORT:-18080}:8080"
    volumes:
      - ${HOST_PROJECTS_DIR:?Set HOST_PROJECTS_DIR in .env}:${WORKSPACE_WATCH_ROOT:-/workspace/projects}:ro
      - app_logs:/app/logs
      - app_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - default
      - app_network

  redis:
    image: redis:7.4-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-copilot-context-management-mcp}-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-replace-me}"]
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-replace-me} ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - default
      - app_network

networks:
  app_network:
    external: true

volumes:
  redis_data:
  app_logs:
  app_data:
